  <style>
    :root{--navy:#0d1b2a;--navy-card:#1b2e42;--navy-hover:#223650;--gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:rgba(201,168,76,0.18);--gold-border:rgba(201,168,76,0.28);--text:#e8edf3;--text-muted:#8ba0b8;--text-dim:#5c7490;--danger:#e05757;--success:#4caf7d;--radius:16px;--radius-sm:8px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--navy);background-image:radial-gradient(ellipse at 20% 10%,rgba(201,168,76,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(30,80,140,0.15) 0%,transparent 50%);color:var(--text);min-height:100vh;padding-bottom:60px;}
    header{border-bottom:1px solid var(--gold-border);padding:22px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;background:rgba(13,27,42,0.92);backdrop-filter:blur(12px);}
    .header-left{display:flex;align-items:center;gap:16px;}
    .logo-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:#0d1b2a;}
    .header-title{font-family:'Poppins',sans-serif;font-size:15px;font-weight:600;color:var(--gold-light);}
    .header-sub{font-size:12px;color:var(--text-dim);margin-top:1px;}
    .btn-back{display:inline-flex;align-items:center;gap:6px;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);font-size:12px;font-weight:500;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all .15s;text-decoration:none;}
    .btn-back:hover{background:rgba(201,168,76,0.28);}
    .wrap{padding:40px;max-width:1280px;margin:0 auto;}
    .page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:36px;gap:16px;flex-wrap:wrap;}
    .page-title{font-family:'Poppins',sans-serif;font-size:24px;font-weight:700;color:var(--text);position:relative;padding-left:16px;}
    .page-title::before{content:'';position:absolute;left:0;top:5px;width:4px;height:20px;background:linear-gradient(to bottom,var(--gold),var(--gold-light));border-radius:2px;}
    .page-sub{font-size:13px;color:var(--text-dim);margin-top:6px;padding-left:16px;}
    .btn-primary{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0d1b2a;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;padding:11px 20px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:opacity .2s;}
    .btn-primary:hover{opacity:.88;}
    .cloud-badge{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:11px;border-radius:20px;padding:3px 12px;background:rgba(34,197,94,0.1);color:#86efac;border:1px solid rgba(34,197,94,0.25);margin-bottom:24px;}
    .cloud-badge.loading{background:rgba(201,168,76,0.1);color:var(--gold-light);border-color:var(--gold-dim);}
    .cloud-badge.error{background:rgba(239,68,68,0.1);color:#fca5a5;border-color:rgba(239,68,68,0.3);}
    .planos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
    .plano-card{background:var(--navy-card);border:1px solid var(--gold-border);border-radius:var(--radius);padding:26px;position:relative;overflow:hidden;transition:all .2s;cursor:pointer;}
    .plano-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
    .plano-card:hover{border-color:var(--gold);transform:translateY(-2px);}
    .plano-icon{font-size:28px;margin-bottom:14px;}
    .plano-nome{font-family:'Poppins',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;}
    .plano-data{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);}
    .plano-desc{font-size:12.5px;color:var(--text-muted);margin-top:10px;line-height:1.5;}
    .plano-actions{display:flex;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid rgba(201,168,76,0.15);}
    .btn-abrir{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0d1b2a;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;padding:9px 14px;border:none;border-radius:8px;cursor:pointer;transition:opacity .2s;}
    .btn-abrir:hover{opacity:.88;}
    .btn-edit{display:flex;align-items:center;gap:5px;background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold);font-size:11px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:all .15s;}
    .btn-edit:hover{background:rgba(201,168,76,0.28);}
    .btn-del{display:flex;align-items:center;gap:5px;background:rgba(224,87,87,0.1);border:1px solid rgba(224,87,87,0.25);color:var(--danger);font-size:11px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:all .15s;}
    .btn-del:hover{background:rgba(224,87,87,0.2);}
    .novo-card{background:transparent;border:2px dashed rgba(201,168,76,0.25);border-radius:var(--radius);padding:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:all .2s;min-height:200px;}
    .novo-card:hover{border-color:var(--gold);background:var(--gold-dim);}
    .novo-icon{font-size:32px;opacity:.5;}
    .novo-label{font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;color:var(--text-dim);}
    .empty{text-align:center;padding:60px 20px;color:var(--text-dim);}
    .empty .e-icon{font-size:40px;margin-bottom:16px;opacity:.35;}
    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(5,12,20,0.75);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
    .modal-overlay.show{display:flex;}
    .modal{background:var(--navy-card);border:1px solid var(--gold-border);border-radius:var(--radius);padding:30px;width:460px;max-width:92vw;}
    .modal-title{font-family:'Poppins',sans-serif;font-size:16px;font-weight:600;color:var(--gold-light);margin-bottom:20px;}
    .form-row{margin-bottom:14px;}
    .form-label{display:block;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
    .form-input,.form-textarea{width:100%;background:rgba(13,27,42,0.6);border:1px solid var(--gold-border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 14px;outline:none;transition:border-color .2s;}
    .form-textarea{min-height:80px;resize:vertical;line-height:1.6;}
    .form-input:focus,.form-textarea:focus{border-color:var(--gold);}
    .modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
    .btn-cancel{background:transparent;border:1px solid var(--gold-border);color:var(--text-dim);font-size:13px;padding:9px 18px;border-radius:8px;cursor:pointer;transition:all .15s;}
    .btn-cancel:hover{color:var(--text);}
    .toast{position:fixed;bottom:28px;right:28px;z-index:300;background:rgba(27,46,66,0.95);border:1px solid var(--gold-border);color:var(--text);font-size:13px;padding:12px 20px;border-radius:var(--radius-sm);backdrop-filter:blur(8px);display:flex;align-items:center;gap:10px;opacity:0;transform:translateY(12px);transition:all .3s;pointer-events:none;}
    .toast.show{opacity:1;transform:translateY(0);}
    .toast .t-icon{color:var(--gold);font-size:16px;}
    @media(max-width:768px){.wrap{padding:22px 18px;}header{padding:16px 18px;}.planos-grid{grid-template-columns:1fr;}}

    </div>
  </div>
  <a href="../index.html" class="btn-back">← Hub</a>
</header>

<div class="wrap">
  <div class="page-head">
    <div>
      <div class="page-title">Planos de Negócio</div>
      <div class="page-sub">Crie e gerencie planos completos — cada card é um plano independente.</div>
    </div>
    <button class="btn-primary" onclick="abrirModalNovo()">＋ Novo plano</button>
  </div>

  <div id="cloudBadge" class="cloud-badge loading">⏳ Carregando planos...</div>

  <div class="planos-grid" id="planos-grid"></div>
</div>

<div class="toast" id="toast"><span class="t-icon">✓</span><span id="toast-msg"></span></div>

<!-- Modal novo/editar -->
<div class="modal-overlay" id="modal-plano">
  <div class="modal">
    <div class="modal-title" id="modal-plano-title">Novo Plano de Negócio</div>
    <div class="form-row">
      <label class="form-label">Nome do plano</label>
      <input type="text" class="form-input" id="pn-nome" placeholder="Ex: Fluignos, Cliente ABC, Projeto X..."/>
    </div>
    <div class="form-row">
      <label class="form-label">Descrição curta</label>
      <textarea class="form-textarea" id="pn-desc" placeholder="Uma linha sobre o negócio..." style="min-height:60px;"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">Ícone (emoji)</label>
      <input type="text" class="form-input" id="pn-icon" placeholder="📊" maxlength="4" style="width:80px;text-align:center;font-size:22px;"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-primary" id="modal-plano-btn" onclick="salvarPlano()">Criar plano</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyArxzlPxV6YonegVS3rO_7LCO_doVXAjg0",
  authDomain:"portal-treinamentos-lang.firebaseapp.com",
  databaseURL:"https://portal-treinamentos-lang-default-rtdb.firebaseio.com",
  projectId:"portal-treinamentos-lang",
  storageBucket:"portal-treinamentos-lang.firebasestorage.app",
  messagingSenderId:"1049839891406",
  appId:"1:1049839891406:web:c5874166bdbee74139f19f"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const DB_PATH = 'planos_negocio_index';

let planos = [];
let editandoId = null;

function uid(){ return 'pn_'+Date.now()+'_'+Math.floor(Math.random()*1e5); }
function byId(id){ return document.getElementById(id); }
function toast(msg){ const t=byId('toast'); byId('toast-msg').textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function setCloud(state,msg){ const b=byId('cloudBadge'); b.className='cloud-badge'+(state==='ok'?'':state==='loading'?' loading':' error'); b.textContent=(state==='ok'?'☁️ ':state==='loading'?'⏳ ':'⚠️ ')+msg; }

function formatDate(iso){ if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }

async function loadPlanos(){
  setCloud('loading','Carregando...');
  try {
    const snap = await get(ref(db, DB_PATH));
    planos = snap.exists() ? Object.values(snap.val()) : [];
    // Seed Fluignos se vazio
    if(!planos.length){
      const fluignos = { id:'pn_fluignos', nome:'Fluignos', desc:'Consultoria de estruturação de escritórios contábeis — SOPs, playbooks e Customer Success.', icon:'🧭', criado:new Date().toISOString().slice(0,10) };
      planos.push(fluignos);
      await saveAll();
    }
    render();
    setCloud('ok',`${planos.length} plano(s) carregado(s)`);
  } catch(e){ setCloud('error','Erro de conexão'); }
}

async function saveAll(){
  const records = {};
  planos.forEach(p=>{ records[p.id]=p; });
  await set(ref(db, DB_PATH), records);
}

function render(){
  const grid = byId('planos-grid');
  grid.innerHTML = '';
  if(!planos.length){
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1;"><div class="e-icon">📋</div><div>Nenhum plano ainda.<br>Clique em "Novo plano" para começar.</div></div>';
    return;
  }
  planos.forEach(p=>{
    const div = document.createElement('div');
    div.className = 'plano-card';
    div.innerHTML = `
      <div class="plano-icon">${p.icon||'📋'}</div>
      <div class="plano-nome">${p.nome}</div>
      <div class="plano-data">Criado em ${formatDate(p.criado)}</div>
      ${p.desc?`<div class="plano-desc">${p.desc}</div>`:''}
      <div class="plano-actions">
        <button class="btn-abrir" onclick="abrirPlano('${p.id}')">Abrir plano →</button>
        <button class="btn-edit" onclick="editarPlano('${p.id}',event)">✏️</button>
        <button class="btn-del" onclick="excluirPlano('${p.id}',event)">✕</button>
      </div>`;
    grid.appendChild(div);
  });
  // Card novo
  const novo = document.createElement('div');
  novo.className = 'novo-card';
  novo.innerHTML = '<div class="novo-icon">＋</div><div class="novo-label">Novo plano</div>';
  novo.onclick = () => abrirModalNovo();
  grid.appendChild(novo);
}

window.abrirPlano = function(id){
  window.location.href = `plano.html?id=${id}`;
};

window.abrirModalNovo = function(){
  editandoId = null;
  byId('modal-plano-title').textContent = 'Novo Plano de Negócio';
  byId('modal-plano-btn').textContent = 'Criar plano';
  byId('pn-nome').value = '';
  byId('pn-desc').value = '';
  byId('pn-icon').value = '📋';
  byId('modal-plano').classList.add('show');
};

window.editarPlano = function(id, e){
  e.stopPropagation();
  editandoId = id;
  const p = planos.find(x=>x.id===id);
  if(!p) return;
  byId('modal-plano-title').textContent = 'Editar Plano';
  byId('modal-plano-btn').textContent = 'Salvar alterações';
  byId('pn-nome').value = p.nome;
  byId('pn-desc').value = p.desc||'';
  byId('pn-icon').value = p.icon||'📋';
  byId('modal-plano').classList.add('show');
};

window.excluirPlano = async function(id, e){
  e.stopPropagation();
  if(!confirm('Excluir este plano? Os dados do plano também serão removidos.')) return;
  planos = planos.filter(p=>p.id!==id);
  // Remove dados do plano também
  try { await remove(ref(db, `plano_dados_${id}`)); } catch(e){}
  await saveAll();
  render();
  toast('Plano excluído.');
};

window.salvarPlano = async function(){
  const nome = byId('pn-nome').value.trim();
  if(!nome){ toast('Digite o nome do plano.'); return; }
  if(editandoId){
    const p = planos.find(x=>x.id===editandoId);
    if(p){ p.nome=nome; p.desc=byId('pn-desc').value; p.icon=byId('pn-icon').value||'📋'; }
  } else {
    planos.push({ id:uid(), nome, desc:byId('pn-desc').value, icon:byId('pn-icon').value||'📋', criado:new Date().toISOString().slice(0,10) });
  }
  fecharModal();
  await saveAll();
  render();
  toast(editandoId?'Plano atualizado.':'Plano criado.');
};

window.fecharModal = function(){ byId('modal-plano').classList.remove('show'); };
byId('modal-plano').addEventListener('click', e=>{ if(e.target===byId('modal-plano')) fecharModal(); });

loadPlanos();
</script>
</body>
</html>
